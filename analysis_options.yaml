# This file configures the static analysis results for your project (errors,
# warnings, and lints).
#
# This enables the 'recommended' set of lints from `package:lints`.
# This set helps identify many issues that may lead to problems when running
# or consuming Dart code, and enforces writing Dart using a single, idiomatic
# style and format.
#
# If you want a smaller set of lints you can change this to specify
# 'package:lints/core.yaml'. These are just the most critical lints
# (the recommended set includes the core lints).
# The core lints are also what is used by pub.dev for scoring packages.

include: package:lints/recommended.yaml


analyzer:
  plugins:
    - custom_lint
 
custom_lint:
  rules:
    # ── Domain Boundary ────────────────────────────────────────────────────
    # Prevents business logic and data transformations inside render().
    # render() must be a pure description of the UI — nothing more.
    - no_logic_in_render: true
 
    # ── Identity Preservation ──────────────────────────────────────────────
    # Pulsar components are long-lived objects. Creating them inline in
    # render() destroys their identity on every morph.
    - no_inline_component_creation: true
 
    # Warns when a Component is stored as a local variable instead of a field.
    # Local variables are recreated on every method call, breaking identity.
    - components_must_be_fields: true
 
    # ── State Management ───────────────────────────────────────────────────
    # morph() inside onInput fires on every keystroke — expensive and
    # causes focus/cursor issues. Use onBlur or onChange instead.
    - no_morph_in_on_input: true
